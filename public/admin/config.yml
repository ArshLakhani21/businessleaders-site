# Sveltia CMS configuration for Business Leader.
#
# Auth: Sveltia CMS uses PKCE OAuth against GitHub directly — no proxy
# needed. On first login, click "Login with GitHub", authorize the
# Sveltia OAuth app, and you're in.
#
# What you can do here:
#  • Create new articles (full schema match against the engine)
#  • Edit existing articles (auto-published or manual, both editable)
#  • Upload images (lands in public/images/articles/)
#  • Every save is a real git commit on businessleaders-site main →
#    Cloudflare Pages auto-deploys in ~60 seconds.

backend:
  name: github
  repo: ArshLakhani21/businessleaders-site
  branch: main
  # Sveltia handles OAuth without a proxy — leave this default.

# Where Sveltia uploads images. Same path the engine uses, so manual
# and auto articles share the media folder.
media_folder: 'public/images/articles'
public_folder: '/images/articles'

# Tell Sveltia where the live site is so the "View Live" link works.
site_url: 'https://businessleaders.in'
display_url: 'https://businessleaders.in'
logo_url: '/logo.png'

publish_mode: simple

editor:
  preview: false   # Astro renders the article — preview here would be inaccurate

collections:
  - name: 'articles'
    label: 'Articles'
    label_singular: 'Article'
    folder: 'src/content/articles'
    create: true
    delete: true
    slug: '{{year}}-{{month}}-{{day}}-{{fields.slug}}'
    extension: 'md'
    format: 'frontmatter'
    summary: '{{title}} — {{beat}} · {{commit_date}}'
    sortable_fields: ['publishedAt', 'beat', 'title', 'auditScore']
    view_filters:
      - label: Beat — Business
        field: beat
        pattern: 'business'
      - label: Beat — Finance
        field: beat
        pattern: 'finance'
      - label: Beat — Entertainment
        field: beat
        pattern: 'entertainment'
      - label: Beat — Sports
        field: beat
        pattern: 'sports'
      - label: Quality — Clean
        field: auditScore
        pattern: '^([7-9]|10)$'
      - label: Manual uploads only
        field: runId
        pattern: '^manual'

    fields:
      - { label: 'Title (20–100 chars)', name: 'title', widget: 'string', pattern: ['.{20,100}', 'Title must be 20–100 characters'] }

      - { label: 'URL Slug (lowercase, dashes, ≤60 chars)', name: 'slug', widget: 'string', pattern: ['^[a-z0-9](?:[a-z0-9-]{0,58}[a-z0-9])?$', 'Lowercase, dashes only, max 60 chars, must start and end alphanumeric'] }

      - label: 'Beat'
        name: 'beat'
        widget: 'select'
        options:
          - { label: 'Business', value: 'business' }
          - { label: 'Finance & Markets', value: 'finance' }
          - { label: 'Entertainment', value: 'entertainment' }
          - { label: 'Lifestyle', value: 'lifestyle' }
          - { label: 'Health & Fitness', value: 'health' }
          - { label: 'Travel', value: 'travel' }
          - { label: 'International', value: 'international' }
          - { label: 'Sports', value: 'sports' }
          - { label: 'Astrology', value: 'astro' }

      - { label: 'Published At', name: 'publishedAt', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: 'HH:mm', format: "YYYY-MM-DDTHH:mm:ssZ" }

      - label: 'Author'
        name: 'author'
        widget: 'object'
        collapsed: false
        fields:
          - { label: 'Name', name: 'name', widget: 'string', default: 'Arsh Lakhani' }
          - { label: 'Slug', name: 'slug', widget: 'string', default: 'arsh-lakhani' }

      - label: 'Sources (≥1, the original outlets)'
        name: 'sources'
        widget: 'list'
        min: 1
        max: 10
        summary: '{{fields.name}} ({{fields.language}})'
        fields:
          - { label: 'Source ID', name: 'id', widget: 'string', hint: 'e.g. reuters-india-markets' }
          - { label: 'Source Name', name: 'name', widget: 'string', hint: 'e.g. Reuters — India Markets' }
          - { label: 'Source URL', name: 'url', widget: 'string', pattern: ['^https?://', 'Must be a valid URL'] }
          - label: 'Language'
            name: 'language'
            widget: 'select'
            default: 'en'
            options: [hi, mr, ta, te, bn, ml, kn, gu, pa, or, en, th, zh, ja, fr, de, ar, es]

      - label: 'Featured Image'
        name: 'image'
        widget: 'object'
        collapsed: false
        fields:
          - { label: 'Image File', name: 'path', widget: 'image', media_folder: '/public/images/articles', public_folder: '/images/articles', media_library: { config: { multiple: false } }, hint: 'Upload or pick from media library — 1600x900 ideal' }
          - { label: 'Alt Text', name: 'alt', widget: 'string', hint: 'For screen readers + SEO' }
          - { label: 'Photographer', name: 'photographer', widget: 'string', default: 'Business Leader' }
          - label: 'Image Source'
            name: 'source'
            widget: 'select'
            default: 'fallback'
            options:
              - { label: 'Pexels', value: 'pexels' }
              - { label: 'Unsplash', value: 'unsplash' }
              - { label: 'Custom upload / fallback', value: 'fallback' }
          - { label: 'Source URL (optional)', name: 'sourceUrl', widget: 'string', required: false }

      - { label: 'Meta Description (120–170 chars)', name: 'metaDescription', widget: 'string', pattern: ['.{120,170}', '120–170 characters'] }

      - { label: 'Tags (1–8 lowercase)', name: 'tags', widget: 'list', min: 1, max: 8, default: [] }

      - { label: 'Word Count', name: 'wordCount', widget: 'number', value_type: 'int', min: 500, max: 2000, hint: 'Engine writes 800–1200; manual entries can be 500–2000' }

      - { label: 'Audit Score (0–10, default 7 for manual)', name: 'auditScore', widget: 'number', value_type: 'int', min: 0, max: 10, default: 7 }

      - { label: 'Run ID', name: 'runId', widget: 'string', default: 'manual', hint: 'Engine sets this to morning-/afternoon-/evening-<run-id>; manual leaves "manual"' }

      - { label: 'Body (Markdown — 800-1200 words target)', name: 'body', widget: 'markdown', buttons: ['bold', 'italic', 'link', 'heading-two', 'heading-three', 'quote', 'bulleted-list', 'numbered-list'], modes: ['rich_text', 'raw'] }
